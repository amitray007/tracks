name: Bug report
description: Report a reproducible problem using synthetic or redacted evidence.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not attach real sessions, credentials, private source code, or unredacted paths. Use the private security-reporting link for vulnerabilities or accidental exposure.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Provide minimal steps and synthetic data that reproduce the problem.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Tracks revision
      placeholder: Commit SHA or version
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Local web viewer
        - CLI
        - Hosted server
        - Live share
        - Claude Code adapter
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed credentials, personal information, private paths, and real session content.
          required: true
