name: Feature request
description: Propose a focused improvement to Tracks.
title: "feature: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should Tracks address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Describe the smallest useful outcome and relevant tradeoffs.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and security impact
      description: Note any new filesystem, network, persistence, rendering, or sharing boundary.
    validations:
      required: true
