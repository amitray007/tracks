name: Release Please

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs['apps/cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['apps/cli--tag_name'] }}
    steps:
      - name: Update the release pull request or create a release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Run checks for the release pull request
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          BRANCH="$(jq -r '.headBranchName // empty' <<<"$RELEASE_PR")"
          test -n "$BRANCH"
          gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$BRANCH"
          gh workflow run secret-scan.yml --repo "$GITHUB_REPOSITORY" --ref "$BRANCH"

  publish-cli:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release-cli.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
